[mypy]
python_version = 3.9
cache_dir = .mypy_cache

files = lib/streamlit/, lib/tests/streamlit/typing/, scripts/, e2e_playwright/
exclude = (?x)(
    ^e2e_playwright/compilation_error_dialog\.py$
    # Ignore all files in e2e_playwright that end with _test.py recursively:
    | ^e2e_playwright/.*_test\.py$
  )

disallow_incomplete_defs = true
disallow_subclassing_any = true
disallow_untyped_decorators = true
allow_redefinition = true
check_untyped_defs = true
disallow_any_generics = true
implicit_reexport = false
no_implicit_optional = true
scripts_are_modules = true
strict_equality = true
strict_optional = true
warn_redundant_casts = true
warn_return_any = true
warn_unused_configs = true
warn_unused_ignores = true
warn_unreachable = true
warn_no_return = true
extra_checks = true
namespace_packages = true

show_error_context = true
show_column_numbers = true
show_error_codes = true
pretty = true

[mypy-shared.*]
ignore_missing_imports = true

[mypy-vega_datasets.*]
ignore_missing_imports = true

[mypy-sympy.*]
ignore_missing_imports = true

[mypy-plotly.*]
ignore_missing_imports = true

[mypy-pandas.*]
ignore_missing_imports = true

[mypy-pydeck.*]
ignore_missing_imports = true

[mypy-pyarrow.*]
ignore_missing_imports = true

[mypy-bokeh.*]
ignore_missing_imports = true

[mypy-graphviz.*]
ignore_missing_imports = true
